# Autobuild configuration
#
# This file documents where Autobuild expects to find its inputs and where it
# writes results. The orchestrator can also be driven directly via its Python
# API if you need more control.

backlog_dir: "backlog"
results_dir: ".autobuild/results"

# Subdirectory of the repo that contains the project source code.
# Only this directory is copied into each workspace; the winner is merged back here.
src_dir: "src"


# Default variation instructions used when a task file omits variation_instructions.
# Exactly 3 entries are required (one per variation). Task-level instructions take
# precedence over these defaults.
#
# Each entry is an object with at least one of: prompt, agent, model.
# A plain string is shorthand for { prompt: "..." }.
# - prompt: instruction text passed to the LLM for this variation
# - agent:  name of an agent defined under `agents` (default_agent is used when omitted)
# - model:  model override for this variation, replacing the agent's default model
default_variation_instructions:
  - "Execute the task from the inside out. Start with the low level components and build up to the higher level components. You should prefer to write idealised 'internal' code before it's needed and adjust later."
  - "Execute the task from the outside in. Write the top level functional interfaces layersfirst, then only when that's done should you implement the 'internal' code."
  - "Write failing tests first at a functional level to sharpen your thinking, then the code. Perform a typical RED -> GREEN -> REFACTOR cycle for each test. Do NOT write multiple failing tests at once!"


# Quality gates run in the workspace after each implementation attempt.
# Each entry is a shell command; all must exit 0 for the attempt to pass.
# Adjust these when changing language, test framework, or analysis tools.
quality_gates:
  - "npm run test"


# CLI agent to use. Set default_agent to the name of an entry under agents.
# Placeholders: {prompt}, {workspace}, {model}. Other {NAME} = environment variable.
# Use [optional args] so that part is omitted when the env var inside is unset
# (e.g. [--api-key {CURSOR_API_KEY}] is dropped when CURSOR_API_KEY is not set).
default_agent: cursor

agents:
  cursor:
    implement_command: "agent --print --trust --force [--api-key {CURSOR_API_KEY}] --workspace {workspace} --model {model} {prompt}"
    compare_command: "agent --print --trust --mode ask [--api-key {CURSOR_API_KEY}] --workspace {workspace} --model {model} {prompt}"
    model: "auto"

  claude:
    implement_command: "claude --print --dangerously-skip-permissions --no-session-persistence --model {model} {prompt}"
    compare_command: "claude --print --permission-mode plan --no-session-persistence --model {model} {prompt}"
    model: "sonnet"

  aider:
    implement_command: "aider --yes --no-git --model {model} --message {prompt}"
    compare_command: "aider --yes --no-git --model {model} --read {path_a} --read {path_b} --message {prompt}"
    model: "openrouter/z-ai/glm-5"

