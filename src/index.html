<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NPV Monte Carlo Simulator</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #0f172a;
        color: #e5e7eb;
      }

      h1 {
        margin-top: 0;
        font-size: 24px;
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        background: #020617;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        border: 1px solid #1e293b;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      label {
        font-size: 12px;
        color: #9ca3af;
        display: block;
        margin-bottom: 4px;
      }

      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #1f2937;
        background: #020617;
        color: #e5e7eb;
        font-size: 13px;
      }

      input:focus {
        outline: none;
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px #38bdf8;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
        font-size: 13px;
      }

      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid #111827;
        text-align: right;
      }

      th:first-child,
      td:first-child {
        text-align: left;
      }

      thead {
        background: #020617;
        position: sticky;
        top: 0;
        z-index: 1;
      }

      tbody tr:nth-child(even) {
        background: #020617;
      }

      .cashflow-input {
        width: 100%;
      }

      button {
        padding: 10px 16px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #0ea5e9, #22c55e);
        color: #020617;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        margin-top: 16px;
      }

      button:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .results {
        margin-top: 24px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }

      .stat {
        background: radial-gradient(circle at top left, #0f172a, #020617);
        border-radius: 10px;
        padding: 12px 14px;
        border: 1px solid #1f2937;
      }

      .stat-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6b7280;
        margin-bottom: 6px;
      }

      .stat-value {
        font-size: 18px;
        font-weight: 600;
      }

      .muted {
        font-size: 12px;
        color: #6b7280;
      }

      .error {
        color: #f97373;
        font-size: 12px;
        margin-top: 8px;
      }

      .header-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }

      .badge {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid #1f2937;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="header-row">
        <div>
          <h1>NPV Monte Carlo Simulator</h1>
          <div class="muted">
            Triangular cash flow distributions, annual discounting.
          </div>
        </div>
        <div class="badge">Reusable core simulation logic</div>
      </div>

      <section class="grid" aria-label="Global parameters">
        <div>
          <label for="periodCount">Number of periods (years)</label>
          <input
            id="periodCount"
            type="number"
            min="1"
            max="40"
            value="5"
            step="1"
          />
        </div>
        <div>
          <label for="discountRate">Discount rate (% per year)</label>
          <input
            id="discountRate"
            type="number"
            step="0.1"
            value="10"
          />
        </div>
        <div>
          <label for="iterations">Iterations</label>
          <input id="iterations" type="number" min="100" step="100" value="10000" />
        </div>
        <div>
          <label for="successThreshold">Success threshold NPV</label>
          <input id="successThreshold" type="number" value="0" />
        </div>
      </section>

      <section aria-label="Cash flow assumptions">
        <table>
          <thead>
            <tr>
              <th>Year</th>
              <th>Min cash flow</th>
              <th>Most likely</th>
              <th>Max cash flow</th>
            </tr>
          </thead>
          <tbody id="cashflowBody"></tbody>
        </table>
      </section>

      <section>
        <button id="runButton">Run simulation</button>
        <div id="error" class="error" role="alert"></div>
      </section>

      <section class="results" aria-label="Simulation results">
        <div class="stat">
          <div class="stat-label">Mean NPV</div>
          <div id="meanNpv" class="stat-value">–</div>
        </div>
        <div class="stat">
          <div class="stat-label">P(success)</div>
          <div id="probSuccess" class="stat-value">–</div>
        </div>
        <div class="stat">
          <div class="stat-label">5th percentile</div>
          <div id="p5" class="stat-value">–</div>
        </div>
        <div class="stat">
          <div class="stat-label">95th percentile</div>
          <div id="p95" class="stat-value">–</div>
        </div>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
