<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monte Carlo Simulation</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main>
    <section class="controls">
      <label>
        Model
        <select id="model">
          <option value="sum">Sum</option>
          <option value="npv">NPV</option>
        </select>
      </label>
      <label>
        Iterations
        <input type="number" id="iterations" min="100" value="10000" step="100">
      </label>
      <button id="run">Run simulation</button>
    </section>
    <section id="npv-params" class="npv-params hidden" aria-label="NPV parameters">
      <h3>NPV parameters</h3>
      <div class="npv-grid">
        <label>
          Initial investment
          <input type="number" id="npv-initial" value="1000" step="100">
        </label>
        <label>
          Discount rate
          <input type="number" id="npv-rate" value="0.1" min="0" max="1" step="0.01">
        </label>
        <label>
          Years
          <input type="number" id="npv-years" value="10" min="1" max="30" step="1">
        </label>
        <label>
          Annual cashflow mean
          <input type="number" id="npv-cf-mean" value="150" step="10">
        </label>
        <label>
          Annual cashflow std dev
          <input type="number" id="npv-cf-std" value="40" min="0" step="5">
        </label>
      </div>
    </section>
    <section id="stats" class="stats" aria-live="polite"></section>
    <section id="chart-section" class="chart-section hidden">
      <h3>NPV cone of uncertainty</h3>
      <p id="break-even" class="break-even hidden" aria-live="polite"></p>
      <div id="chart" class="chart-container" role="img"></div>
      <p class="chart-legend">
        <span class="legend-band-2">±2σ</span>
        <span class="legend-band-1">±1σ</span>
        <span class="legend-median">50th percentile (median)</span>
      </p>
    </section>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
