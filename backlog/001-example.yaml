id: "001"
title: Create a monte carlo simulation for Net Present Value
description: |
  Create a monte carlo simulation for Net Present Value that can be used to estimate the probability of success of a project.
  The core simulation logic should be in a separate file, and reusable by other models in the future.
  Stack: plain HTML and DOM usage. Logic should be in separate files and there should be some tests.
  No documentation or comments. Just the code.
context_files:
variation_instructions:
  - "You are a ATDD expert. Write the tests first at a functional level, then the code."
  - "You are an world-class software engineer."
  - "You are an expert developer, but you also have a PhD in statistics and machine learning."
extensibility_scenario: |
  If I want to introduce a different model (other than NPV) I should be able to reuse a core of simulation logic.
min_coverage: 85

